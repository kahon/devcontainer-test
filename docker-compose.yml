services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src/web:/var/www/html
    networks:
      - nutrilink

  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./src/web:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - analysis
    networks:
      - nutrilink

  analysis:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    volumes:
      - ./src/analysis:/app
    ports:
      - "8001:8000"
    networks:
      - nutrilink

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - nutrilink

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - nutrilink

networks:
  nutrilink:

volumes:
  db_data:
